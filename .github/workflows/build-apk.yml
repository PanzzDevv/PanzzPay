name: Build and Release Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.2
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Build APK
      run: |
        cd panzzpay-forwarder-app
        gradle assembleDebug --stacktrace

    - name: Prepare APK File
      run: |
        cp panzzpay-forwarder-app/app/build/outputs/apk/debug/app-debug.apk panzzpay-forwarder.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: PanzzPay-Forwarder-APK
        path: panzzpay-forwarder.apk

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        tag_name: latest
        name: PanzzPay Forwarder Latest Build
        body: |
          🚀 Automatic Build dari GitHub Actions.
          File APK ini digunakan untuk auto-update in-app aplikasi PanzzPay Forwarder Android.
        files: panzzpay-forwarder.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
