name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version without the v prefix
        required: true
        default: '2.2.4'

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Gradle 8.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Resolve Android release version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            app_version="${GITHUB_REF_NAME#v}"
          else
            app_version="$INPUT_VERSION"
          fi
          if [[ ! "$app_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use major.minor.patch." >&2
            exit 1
          fi
          IFS='.' read -r major minor patch <<< "$app_version"
          if (( minor > 99 || patch > 9999 )); then
            echo "Minor must be <= 99 and patch must be <= 9999." >&2
            exit 1
          fi
          version_code=$((major * 1000000 + minor * 10000 + patch))
          echo "APP_VERSION_NAME=$app_version" >> "$GITHUB_ENV"
          echo "APP_VERSION_CODE=$version_code" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$app_version" >> "$GITHUB_ENV"

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/panzzpay-release.keystore"
          chmod 600 "$RUNNER_TEMP/panzzpay-release.keystore"

      - name: Verify Android UI lifecycle and lint
        run: |
          cd panzzpay-forwarder-app
          gradle testDebugUnitTest lintDebug --stacktrace

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/panzzpay-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd panzzpay-forwarder-app
          gradle assembleRelease --stacktrace

      - name: Remove restored signing key
        if: always()
        run: rm -f "$RUNNER_TEMP/panzzpay-release.keystore"

      - name: Prepare APK file
        run: cp panzzpay-forwarder-app/app/build/outputs/apk/release/app-release.apk panzzpay-forwarder.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PanzzPay-Forwarder-APK
          path: panzzpay-forwarder.apk

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" panzzpay-forwarder.apk \
            --target "$GITHUB_SHA" \
            --title "PanzzPay Forwarder $RELEASE_TAG" \
            --notes "Pembaruan PanzzPay Forwarder $RELEASE_TAG.

          - Memperbaiki force close saat layar utama menampilkan switch layanan.
          - Menambahkan pengujian lifecycle layar utama sebelum APK dirilis.
          - Mempertahankan perbaikan deteksi versi dan keamanan installer."
