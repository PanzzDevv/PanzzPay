name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Gradle 8.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/panzzpay-release.keystore"
          chmod 600 "$RUNNER_TEMP/panzzpay-release.keystore"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/panzzpay-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd panzzpay-forwarder-app
          gradle assembleRelease --stacktrace

      - name: Remove restored signing key
        if: always()
        run: rm -f "$RUNNER_TEMP/panzzpay-release.keystore"

      - name: Prepare APK file
        run: cp panzzpay-forwarder-app/app/build/outputs/apk/release/app-release.apk panzzpay-forwarder.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PanzzPay-Forwarder-APK
          path: panzzpay-forwarder.apk

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            release_tag="$GITHUB_REF_NAME"
          else
            release_tag="v2.1.${GITHUB_RUN_NUMBER}"
          fi
          gh release create "$release_tag" panzzpay-forwarder.apk \
            --target "$GITHUB_SHA" \
            --title "PanzzPay Forwarder $release_tag" \
            --notes "Signed security-hardened Android release from GitHub Actions run #${GITHUB_RUN_NUMBER}."
